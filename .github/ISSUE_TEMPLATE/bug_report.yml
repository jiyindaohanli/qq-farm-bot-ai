name: Bug反馈
description: 反馈运行中遇到的异常问题
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        > 感谢你的反馈，请尽量填写完整信息，方便我们快速定位问题。。

  - type: dropdown
    id: platform
    attributes:
      label: 平台
      description: 请选择游戏平台
      options:
        - 微信小程序
        - QQ小程序
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: windows系统
      description: 请选择windows系统版本
      options:
        - Windows 11
        - Windows 10
        - Windows 7
        - Windows Server 2025
        - Windows Server 2022
        - Windows Server 2019
        - Windows Server 2016
        - 其它 - 请在问题描述
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: 软件版本
      description: 你当前使用的是哪个版本？（例如 v1.0.1）
      placeholder: v1.0.1
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: 问题现象
      description: 请描述实际表现与预期表现
      placeholder: 例如：隐藏小程序后无法按预期执行
    validations:
      required: false

  - type: textarea
    id: repro_steps
    attributes:
      label: 复现步骤
      description: 请填写如何复现这个问题。
      placeholder: |
        1. 打开软件
        2. 点击 xxx
        3. 输入 xxx
        4. 出现 xxx 问题
    validations:
      required: false

  - type: textarea
    id: screenshots
    attributes:
      label: 截图、录屏或附件
      description: 可以拖拽/粘贴图片、录屏、日志文件等附件到这里。
      placeholder: |
        请上传相关截图、录屏或日志文件。
        支持直接拖拽、复制粘贴到输入框。
      
  - type: textarea
    id: debug_log
    attributes:
      label: debug日志
      description: 请粘贴相关日志片段（建议使用代码块）
      placeholder: |
        2026-05-01 23:31:11.433 [INFO] 正在检查好友农场是否有可执行的任务...
      render: text
    validations:
      required: false