name: 需求/功能建议
description: 提出新功能、优化建议或改进想法
title: "【功能建议】："
labels: ["enhancement"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        感谢你的建议，请尽量说明使用场景和预期效果。

  - type: textarea
    id: problem
    attributes:
      label: 你遇到的问题
      description: 这个功能主要想解决什么问题？
      placeholder: "例如：当前每次都需要手动导入配置，操作比较麻烦。"
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 期望的解决方案
      description: 你希望增加或改进什么功能？
      placeholder: "例如：希望增加自动保存配置的功能。"
    validations:
      required: true

  - type: textarea
    id: use-case
    attributes:
      label: 使用场景
      description: 请描述这个功能在什么情况下会被使用。
      placeholder: "例如：用户频繁切换不同配置时，可以快速恢复上一次设置。"

  - type: textarea
    id: alternatives
    attributes:
      label: 其他方案
      description: 你是否考虑过其他替代方案？

  - type: checkboxes
    id: checklist
    attributes:
      label: 提交前检查
      options:
        - label: 我已经搜索过现有 Issues，确认没有重复提交。
          required: true
        - label: 这个建议与当前项目相关。
          required: true